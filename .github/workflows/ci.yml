name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: windows-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install backend dependencies
        run: |
          python -m venv .venv-ci
          .\.venv-ci\Scripts\python.exe -m pip install --upgrade pip
          .\.venv-ci\Scripts\python.exe -m pip install -e ".[dev]"

      - name: Ruff lint
        run: .\.venv-ci\Scripts\python.exe -m ruff check .

      - name: Ruff format
        run: .\.venv-ci\Scripts\python.exe -m ruff format --check .

      - name: Mypy
        run: .\.venv-ci\Scripts\python.exe -m mypy app

      - name: Verify migration round trip
        run: .\.venv-ci\Scripts\python.exe scripts\verify_migrations.py

      - name: Pytest
        run: .\.venv-ci\Scripts\python.exe -m pytest tests -q

  frontend:
    name: Frontend
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install frontend dependencies
        run: npm ci

      - name: Prettier
        run: npm run format

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm run test

      - name: Build
        run: npm run build
