name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: [self-hosted, Windows, X64, novelflow]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Package frontend
        shell: pwsh
        run: Compress-Archive -Path frontend/dist -DestinationPath "novelflow-frontend-$env:GITHUB_REF_NAME.zip"

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            "novelflow-frontend-$env:GITHUB_REF_NAME.zip" `
            --verify-tag `
            --generate-notes `
            --title "NovelFlow $env:GITHUB_REF_NAME"
