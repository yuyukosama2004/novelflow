name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build and publish
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  release:
    name: Build and publish release
    runs-on: [self-hosted, Windows, X64, novelflow]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Build frontend
        working-directory: frontend
        shell: powershell
        run: |
          npm ci
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm run build
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Package frontend
        shell: powershell
        run: |
          $archive = "novelflow-frontend-$env:RELEASE_TAG.zip"
          Compress-Archive -Path frontend/dist -DestinationPath $archive

      - name: Create GitHub release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:RELEASE_TAG
          $archive = "novelflow-frontend-$tag.zip"
          $existingRelease = @(
            gh release list --limit 1000 --json tagName |
              ConvertFrom-Json |
              Where-Object { $_.tagName -eq $tag }
          )
          if ($existingRelease.Count -gt 0) {
            gh release upload $tag $archive --clobber
          } else {
            gh release create $tag `
              $archive `
              --verify-tag `
              --generate-notes `
              --title "NovelFlow $tag"
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
